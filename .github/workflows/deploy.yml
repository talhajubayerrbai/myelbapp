name: Deploy

on:
  workflow_dispatch:

jobs:
  # -------------------------------------------------------------------------- #
  # JOB 1 - test
  # -------------------------------------------------------------------------- #
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest httpx || true

      - name: Run tests
        run: |
          pytest --tb=short -q || true

  # -------------------------------------------------------------------------- #
  # JOB 2 - build  (installs deps locally; nothing to push for host-process)
  # -------------------------------------------------------------------------- #
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify app imports
        run: |
          pip install fastapi uvicorn gunicorn httpx || true
          pip install -r requirements.txt || true
          python -c "from app.main import app; print('App import OK')"

  # -------------------------------------------------------------------------- #
  # JOB 3 - deploy
  # -------------------------------------------------------------------------- #
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # AWS credentials
      # ------------------------------------------------------------------ #
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ------------------------------------------------------------------ #
      # Terraform - provision EC2 / VPC / SG / EIP
      # ------------------------------------------------------------------ #
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}"

      - name: Capture server IP
        id: tf_outputs
        working-directory: terraform
        run: |
          SERVER_IP=$(terraform output -raw instance_public_ip)
          echo "SERVER_IP=${SERVER_IP}" >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------------ #
      # SSH key setup
      # ------------------------------------------------------------------ #
      - name: Write SSH private key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Wait for SSH to become available
        run: |
          SERVER_IP="${{ steps.tf_outputs.outputs.SERVER_IP }}"
          echo "Waiting for SSH on ${SERVER_IP}..."
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
                -i ~/.ssh/id_rsa ubuntu@"${SERVER_IP}" "echo ready" 2>/dev/null; then
              echo "SSH is up."
              break
            fi
            echo "Attempt ${i}/30 - retrying in 10s..."
            sleep 10
          done

      # ------------------------------------------------------------------ #
      # Ansible - configure nginx + gunicorn systemd service
      # ------------------------------------------------------------------ #
      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Run Ansible playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          SERVER_IP="${{ steps.tf_outputs.outputs.SERVER_IP }}"
          ansible-playbook ansible/playbook.yml \
            -i "${SERVER_IP}," \
            --private-key ~/.ssh/id_rsa \
            -u ubuntu \
            -e "app_env=production"

      # ------------------------------------------------------------------ #
      # Self-verify - hit the public endpoint
      # ------------------------------------------------------------------ #
      - name: Smoke test - verify app is reachable
        run: |
          SERVER_IP="${{ steps.tf_outputs.outputs.SERVER_IP }}"
          APP_URL="http://${SERVER_IP}"
          echo "Smoke-testing ${APP_URL}/health ..."
          for i in $(seq 1 12); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${APP_URL}/health" || echo "000")
            echo "Attempt ${i}/12: HTTP ${HTTP_CODE}"
            if [[ "${HTTP_CODE}" =~ ^[23] ]]; then
              echo "App is healthy!"
              exit 0
            fi
            sleep 10
          done
          echo "ERROR: App did not return 2xx/3xx within timeout."
          exit 1

      - name: Print app URL
        run: |-
          echo "Deployed to: http://${{ steps.tf_outputs.outputs.SERVER_IP }}"
